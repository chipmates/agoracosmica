name: Publish Docker Images

# Builds the self-host images for linux/amd64 + linux/arm64, pushes them to
# ghcr.io/chipmates, and scans the results with Trivy.
#
# Images (v1.1.0+):
#   - agoracosmica           : the web app
#   - agoracosmica-tts-kokoro: Local Mode English TTS
#   - agoracosmica-stt-whisper: Local Mode Whisper STT
#   - agoracosmica-tts-qwen-cuda: Local Mode German TTS (NVIDIA-only)
#
# Triggers:
#   - push to a `v*` tag (e.g. v1.1.0) — the canonical release path
#   - manual workflow_dispatch — for ad-hoc rebuilds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag suffix (default: derived from ref)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    name: ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: agoracosmica
            context: ./client
            dockerfile: ./client/Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: agoracosmica-tts-kokoro
            context: ./docker/tts-kokoro
            dockerfile: ./docker/tts-kokoro/Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: agoracosmica-stt-whisper
            context: ./docker/stt-whisper
            dockerfile: ./docker/stt-whisper/Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: agoracosmica-tts-qwen-cuda
            context: ./docker/tts-qwen-cuda
            dockerfile: ./docker/tts-qwen-cuda/Dockerfile
            # CUDA-only — amd64 only. Apple Silicon users use the native
            # MLX path via scripts/setup-local-tts-apple.sh, not docker.
            platforms: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/chipmates/${{ matrix.image.name }}
          # `:latest` updates on both default-branch pushes and version-tag
          # pushes. Without the tag-push enable, `docker compose up` (which
          # pulls `:latest`) would keep serving the previous release after a
          # tag publish. Workflow_dispatch with `inputs.tag` also updates
          # `:latest` so manual reruns republish the floating tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ inputs.tag != '' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Generate SBOM attestation
        uses: actions/attest-sbom@v1
        if: github.event_name == 'push'
        with:
          subject-name: ghcr.io/chipmates/${{ matrix.image.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ""
          push-to-registry: true
        continue-on-error: true

      - name: Scan with Trivy
        # Advisory only. Audio containers track upstream third-party bases
        # (Speaches, Kokoro, NVIDIA CUDA). We patch what apt/apk can fix
        # via base-image upgrades in each Dockerfile, but residual CVEs in
        # distro packages without backported fixes (Debian trixie, Ubuntu
        # 22.04) flow through. Reporting CVEs as workflow annotations is
        # the visibility we want; gating the release on them blocks
        # publishing for issues we can't fix without changing upstream.
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ghcr.io/chipmates/${{ matrix.image.name }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
