name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '8'

jobs:
  check:
    name: Tests + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      - name: Setup assets (downloads content from CDN)
        working-directory: ./client
        run: pnpm setup:assets

      - name: Run unit tests
        working-directory: ./client
        run: pnpm test:unit

      - name: Build
        working-directory: ./client
        run: pnpm build

  docker-build:
    name: Docker build (self-host image)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push) on amd64
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          platforms: linux/amd64
          push: false
          tags: agoracosmica:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
