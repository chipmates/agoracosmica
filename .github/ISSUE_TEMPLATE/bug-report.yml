name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen instead?
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Which mode were you using?
      options:
        - Story Mode
        - Wisdom Mode (Seed Conversation)
        - Quest Mode (Seed Challenge)
        - Free Talk
        - Council
        - Prism
        - Settings / Navigation
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - Samsung Internet
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Mobile (iOS)
        - Mobile (Android)
        - Tablet
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: Using free tier or BYOK?
      options:
        - Free tier (no API key)
        - BYOK (own OpenRouter key)
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Open browser DevTools (F12), check the Console tab, and paste any errors here.
      render: shell
    validations:
      required: false
