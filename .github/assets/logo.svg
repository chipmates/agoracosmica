<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Agora Cosmica">
  <title>Agora Cosmica</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1c2452"/>
      <stop offset="100%" stop-color="#151c48"/>
    </radialGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8e696"/>
      <stop offset="40%" stop-color="#e6bc5c"/>
      <stop offset="100%" stop-color="#be9b37"/>
    </radialGradient>
    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="dotGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#e6bc5c" stroke-width="6" opacity="0.18" filter="url(#ringGlow)"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#e6bc5c" stroke-width="3"/>
  <circle cx="100" cy="100" r="29" fill="#e6bc5c" opacity="0.12" filter="url(#dotGlow)"/>
  <circle cx="100" cy="100" r="29" fill="url(#dot)"/>
</svg>
