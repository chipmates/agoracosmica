    <style>
      /* Static brand splash shown inside #root before React mounts. Matches
         the cosmic LoginPage's dark blue + gold palette so the swap into the
         hydrated app is visually quiet. ~700 bytes inline keeps it under the
         CSS-bundle-blocking threshold and gives a first paint inside
         ~150ms even on slow networks. React replaces this content on first
         render (createRoot clears #root before its initial commit). */
      html, body { margin: 0; padding: 0; }
      body {
        background: #151C47;
        color: #D2D2D2;
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        min-height: 100vh;
        min-height: 100dvh;
      }
      .agc-splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 3rem 1.5rem 1.5rem;
        text-align: center;
        box-sizing: border-box;
      }
      .agc-splash__brand {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
      }
      .agc-splash__name {
        font-family: 'Libre Caslon Text', Georgia, 'Times New Roman', serif;
        font-size: clamp(2.25rem, 7vw, 3.25rem);
        color: #E6BC5C;
        margin: 0;
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1.1;
      }
      .agc-splash__tag {
        font-family: 'Libre Caslon Text', Georgia, serif;
        font-style: italic;
        font-size: clamp(1rem, 2.5vw, 1.25rem);
        color: #D4A539;
        margin: 0;
        max-width: 26ch;
        line-height: 1.4;
        opacity: 0.92;
      }
      .agc-splash__trust {
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        color: rgba(210, 210, 210, 0.45);
        margin: 0;
      }
    </style>
    <!-- The brand JSON-LD graph (Organization / EducationalOrganization /
         WebSite) is emitted only by the static homepage at / via
         marketing/src/lib/schemas.ts. This shell is noindexed and served at
         /app, so it must not duplicate that graph or claim to be the brand
         homepage. -->
    <title>Agora Cosmica - A Living Library You Can Talk To</title>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="agc-splash" aria-hidden="true">
        <div class="agc-splash__brand">
          <p class="agc-splash__name">Agora Cosmica</p>
          <p class="agc-splash__tag">A Living Library You Can Talk To</p>
        </div>
        <p class="agc-splash__trust">Nonprofit · Open Source · No tracking cookies, no profiling</p>
      </div>
    </div>
    <script src="/config.js"></script>
    <script type="module" src="/src/index.tsx"></script>
</body>
