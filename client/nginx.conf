# Agora Cosmica self-host nginx config.
# Runs inside the nginxinc/nginx-unprivileged image (port 8080, user 101).

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Trim some attack-surface noise from default error pages
    server_tokens off;

    # gzip text-y responses. Static assets (hashed) are pre-gzipped by Vite
    # already, but the entry HTML and JSON benefit.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # Security headers (apply to every response, including errors).
    # COEP=require-corp is deliberately omitted: self-host disables live
    # voice (the only WASM-audio path that needed SharedArrayBuffer), and
    # require-corp would block cross-origin images from the default media
    # CDN at https://media.agoracosmica.org.
    add_header X-Content-Type-Options       "nosniff"                                                  always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"                          always;
    add_header Permissions-Policy           "camera=(), geolocation=(), microphone=(self), payment=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                                              always;
    add_header Cross-Origin-Resource-Policy "same-origin"                                              always;
    add_header X-Frame-Options              "SAMEORIGIN"                                               always;

    # Plain-text healthcheck for docker HEALTHCHECK and ops tooling.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Hashed bundles produced by Vite are content-addressed, so a one-year
    # cache is safe. Using `expires` (not `add_header Cache-Control`) so the
    # server-scope security headers keep inheriting.
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # Runtime config is rewritten at container start. Never cache it.
    location = /config.js {
        expires -1;
        try_files $uri =404;
    }

    # SPA shell. Never cache so updates land on the next request.
    location = / {
        expires -1;
        try_files $uri /index.html;
    }
    location = /index.html {
        expires -1;
        try_files $uri =404;
    }

    # Optional same-origin media mirror. Operators using the content-mirror
    # compose profile drop the content tree here; the location returns 404
    # if the file is missing rather than falling through to /index.html.
    location /media/ {
        expires 7d;
        try_files $uri =404;
    }

    # Everything else falls back to the SPA shell for client-side routing.
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
