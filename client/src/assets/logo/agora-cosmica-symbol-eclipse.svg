  <circle cx="100" cy="100" r="76" fill="none" stroke="#e6bc5c" stroke-width="7" opacity="0.15" filter="url(#ringGlow)"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#e6bc5c" stroke-width="3.5"/>
  <circle cx="100" cy="100" r="31" fill="#e6bc5c" opacity="0.12" filter="url(#dotGlow)"/>
  <circle cx="100" cy="100" r="31" fill="url(#dotGrad)"/>
